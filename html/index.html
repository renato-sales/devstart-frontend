<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>DevStart</title>
  </head>
  <body>
    <header>
      <div class="header container">
        <h2>&lt;Dev<span class="header__logotype">Start</span>/&gt;</h2>
        <nav class="header__links">
          <a href="#">Início</a>
          <a href="#">Cursos</a>
          <a href="#">Sobre nós</a>
          <a href="#">Depoimentos</a>
          <a href="#">Localização</a>
          <a href="#">Contato</a>
        </nav>
        <a class="header__link-style" href="#"
          ><img src="../assets/header/user-regular-full.svg" alt="" />Entrar</a
        >
      </div>
    </header>
    <main>
      <section class="section-main">
        <div class="section-main__info container">
          <article class="section-main__info__left">
            <span class="section-main__info__left__top"
              >Transforme seu futuro</span
            >
            <h1>
              Aprenda. Pratique.
              <span class="section-main__info__left__text-title"
                >Conquiste.</span
              >
            </h1>
            <p class="section-main__info__left__text-paragraph">
              Cursos completos para você sair do zero e construir uma carreira
              de sucesso na tecnologia.
            </p>
            <div class="section-main__info__left__buttons">
              <button class="section-main__info__left__buttons__button">
                Explorar cursos &#8594;
              </button>
              <button
                class="section-main__info__left__buttons__button-learn-more"
              >
                Saiba mais
              </button>
            </div>
            <div class="section-main__info__left__descriptions">
              <div class="section-main__info__left__descriptions__info">
                <img
                  src="../assets/main/section_main/graduation-cap-solid-full.svg"
                  alt="chapeu formado"
                />
                <p>Conteúdo Atualizado</p>
              </div>
              <div class="section-main__info__left__descriptions__info">
                <img
                  src="../assets/main/section_main/code-solid-full.svg"
                  alt="chapeu formado"
                />
                <p>Projetos Práticos</p>
              </div>
              <div class="section-main__info__left__descriptions__info">
                <img
                  src="../assets/main/section_main/user-group-solid-full.svg"
                  alt="chapeu formado"
                />
                <p>Comunidade Ativa</p>
              </div>
            </div>
          </article>
          <article class="section-main__info__right">
            <img
              src="../assets/main/section_main/img_main.png"
              alt="notebook"
            />
          </article>
        </div>
      </section>
    </main>
    <script src="../js/script.js"></script>
  </body>
</html>
